<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification details</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>

<body>

<div class="topbar">

    <div class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
    </div>

    <div class="title">
        Verification details
    </div>

</div>

<div class="container">

    <!-- ICON VERIFIED -->
    <div class="verified-wrapper">

        <div class="verified-circle">
            <i class="fa-solid fa-check"></i>
        </div>

    </div>

    <!-- TITLE -->
    <h1 class="main-title">
        Dokumen Ini<br>
        Terverifikasi
    </h1>

    <p class="subtitle">
        Sertifikat resmi dengan validasi digital sekolah
    </p>

    <!-- FILE CARD -->
    <div class="file-card">

        <div class="file-top">

            <div class="file-icon">
                <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png">
            </div>

            <div class="file-info">

                <div class="file-name">
                    Piagam_Rangking_3_SMT_I_2025.png
                </div>

                <div class="file-desc">
                    Dokumen Sertifikat Digital
                </div>

            </div>

        </div>

        <a href="files/Piagam_Rangking_3_SMT_I_2025.png"
           target="_blank"
           class="view-btn">

            View

        </a>

    </div>

    <!-- SIGNATURE -->
    <div class="signature-label">
        1 VALID SIGNATURE FOUND
    </div>

    <div class="signature-card">

        <div class="school-logo">
            <img src="logo.png">
        </div>

        <div class="school-info">

            <div class="school-name">
                UPT SD Negeri Tugurejo 02
            </div>

            <div class="school-location">
                Kabupaten Blitar
            </div>

        </div>

    </div>

    <div class="trusted-box">

        Trusted

        <i class="fa-solid fa-circle-check"></i>

    </div>

</div>

</body>
</html>
